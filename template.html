<!DOCTYPE html>
<html>
<head>
  <title>RepoReady Report</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="navbar">
  <div class="logo">🛡 RepoReady</div>
  <div class="right">
    <span class="live">● LIVE ASSESSMENT</span>
    <span class="version">v1.0.0</span>
  </div>
</div>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="left card">

    <p class="label">OVERALL SCORE</p>
    <h3>Research Readiness</h3>

    <div class="score">
      {{data.score}} <span>/100</span>
    </div>

    <div class="progress">
      <div class="bar" style="width: {{data.score}}%"></div>
    </div>

    <p class="desc">
      Repository analysis based on README, License, Tests, and best practices.
    </p>

    <!-- ✅ DOWNLOAD BUTTONS -->
    <div class="buttons">
      <a href="report.json" download>
        <button>⬇ JSON</button>
      </a>

      <a href="report.html" download>
        <button class="dark">📄 HTML REPORT</button>
      </a>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="right card">

    <h2>Detailed Assessment</h2>

    {% for check in data.checks %}
    <div class="check {{check.status}}">
      
      <div class="check-header">
        <h4>{{check.name}}</h4>
        <span class="score-small">{{check.score}}/{{check.max}}</span>
      </div>

      <p>{{check.message}}</p>

    </div>
    {% endfor %}

  </div>

</div>

</body>
</html>
